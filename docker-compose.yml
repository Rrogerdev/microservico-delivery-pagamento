services:
  pagamento:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-pagamento
    restart: unless-stopped

    ports:
      - "9524:9524"        # Porta pública do microsserviço (mapeada no servidor)

    environment:
      PORT: 9524
      NODE_ENV: production

      # ── Banco de dados ─────────────────────────────────────────────────────
      # Configure no arquivo .env (nunca commitar credenciais)
      DATABASE_PAGAMENTOS_URL: ${DATABASE_URL}

      # ── RabbitMQ (servidor externo da faculdade) ───────────────────────────
      RABBITMQ_URL: amqp://admin:admin@10.136.38.50:5672"          # amqp://admin:adminadmin@academico3.rj.senac.br:5672
      RABBITMQ_RECONNECT_DELAY: 5000         # ms entre tentativas de reconexão


    # Garante que o container só sobe se o DB estiver acessível
    # (útil quando o DB também estiver no compose; remova se for externo)
    # depends_on:
    #   db:
    #     condition: service_healthy

    #networks:
    #  - biblioteca-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Rede interna do projeto Biblioteca ───────────────────────────────────────
networks:
  delivery-net:
    name: delivery-net
    driver: bridge
